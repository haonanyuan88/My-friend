<!DOCTYPE html>
<html>
<head>
  <title>GOOD friends</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #fff7fb;
      color: #222;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    h1 {
      color: blue;
      font-size: 36px; 
      line-height: 1.2;
      margin-bottom: 16px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      font-style: italic;
      font-weight: bold;
      margin-bottom: 12px;
    }

    .photos {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .photos img {
      width: 50%;
      height: auto;
    }

    .bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 18px;
    }

    h2 {
      font-family: "Arial Black", sans-serif;
      font-size: 30px;
      color: brown;
      margin: 0;
    }

    a {
      display: inline-block;
      padding: 10px 18px;
      background-color: #E1306C;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>Me & friend:</h1>

    <p>
      “When you guys have already finished fried chicken, fries, mozzarella sticks,
      downed two Monsters, had a plate of pasta, and even smashed half a pizza —
      and then your friend leans over like, ‘Should we get dessert too?’”
    </p>

    <div class="photos">
      <img src="friends/door.jpg">
      <img src="friends/photo.jpg">
      <img src="friends/catdog.jpg">
      <img src="friends/penguin.jpg">
    </div>

    <div class="bottom">
      <h2>Twinbro ➡️</h2>

      <a href="https://www.instagram.com/nico93nicolas" target="_blank">
        📷 Nico
      </a>
    </div>

  </div>
</body>
</html>
